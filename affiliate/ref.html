<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Connecting you to engineersTech…</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#050d1a;color:#eef3ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{max-width:440px;width:100%;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:2.5rem 2rem;text-align:center}
.logo{width:52px;height:52px;background:linear-gradient(135deg,#0058cc,#2483ff);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.logo svg{width:28px;height:28px;fill:white}
h1{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
p{font-size:.9rem;color:#8da4c0;margin-bottom:1.75rem;line-height:1.65}
.wa-btn{display:inline-flex;align-items:center;gap:.625rem;padding:.875rem 1.75rem;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border-radius:9999px;font-size:.9375rem;font-weight:700;text-decoration:none;transition:transform .2s,box-shadow .2s}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,211,102,.35)}
.wa-btn svg{width:22px;height:22px;fill:currentColor}
.spinner{width:36px;height:36px;border:3px solid rgba(36,131,255,.2);border-top-color:#2483ff;border-radius:50%;animation:spin .8s linear infinite;margin:1.5rem auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.refcode{font-size:.75rem;color:#8da4c0;margin-top:1.25rem;opacity:.6}
/* affiliate builder */
.builder{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08);text-align:left}
.builder h2{font-size:.875rem;font-weight:600;margin-bottom:.875rem;text-align:center;color:#eef3ff}
.f{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.f label{font-size:.75rem;font-weight:500;color:#8da4c0}
.f input,.f select{padding:.5rem .75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:#eef3ff;font-size:.8125rem;font-family:inherit;outline:none}
.f input:focus,.f select:focus{border-color:#2483ff}
.gen-btn{width:100%;padding:.625rem;background:rgba(36,131,255,.15);border:1px solid rgba(36,131,255,.3);color:#60aaff;border-radius:8px;font-size:.8125rem;font-weight:600;cursor:pointer;transition:background .2s}
.gen-btn:hover{background:rgba(36,131,255,.25)}
.out{margin-top:.75rem;word-break:break-all;font-size:.75rem;color:#60aaff;background:rgba(36,131,255,.08);padding:.625rem .875rem;border-radius:8px;display:none;cursor:pointer}
.copy-hint{font-size:.6875rem;color:#8da4c0;text-align:center;margin-top:.375rem;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
  <h1>Connecting you to engineersTech</h1>
  <p id="msgText">One moment — opening WhatsApp for you…</p>
  <a class="wa-btn" id="waBtn" href="#" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Chat on WhatsApp
  </a>
  <div class="spinner" id="spinner"></div>
  <div class="refcode" id="refCode"></div>

  <!-- Affiliate Link Builder -->
  <div class="builder">
    <h2>🔗 Generate Your Affiliate Link</h2>
    <div class="f"><label>Your Affiliate Code</label><input type="text" id="bRef" placeholder="e.g. partner123" /></div>
    <div class="f"><label>Campaign / Service</label>
      <select id="bSvc">
        <option value="">General Inquiry</option>
        <option value="web-app">Web App Development</option>
        <option value="mobile-app">Mobile App</option>
        <option value="saas">SaaS Platform</option>
        <option value="erp">ERP / CRM</option>
        <option value="uiux">UI/UX Design</option>
      </select>
    </div>
    <div class="f"><label>Custom Message (optional)</label><input type="text" id="bMsg" placeholder="Hi, I was referred by…" /></div>
    <button class="gen-btn" id="genBtn">Generate Link</button>
    <div class="out" id="linkOut"></div>
    <div class="copy-hint" id="copyHint">✓ Copied to clipboard!</div>
  </div>
</div>

<script>
(function(){
  const WA = '8801873722228';
  const p  = new URLSearchParams(location.search);
  const ref = p.get('ref') || '';
  const svc = p.get('svc') || '';
  const msg = p.get('msg') || '';

  // Build WhatsApp message
  const parts = ['Hi engineersTech!'];
  if (svc)  parts.push(`I\'m interested in: ${decodeURIComponent(svc)}.`);
  if (msg)  parts.push(decodeURIComponent(msg));
  if (ref)  parts.push(`(Ref: ${ref})`);
  const waText = encodeURIComponent(parts.join(' '));
  const waUrl  = `https://wa.me/${WA}?text=${waText}`;

  document.getElementById('waBtn').href = waUrl;

  if (ref) {
    document.getElementById('refCode').textContent = `Referral: ${ref}`;
  }

  // Track click (fire-and-forget)
  function track(event) {
    const endpoint = window.ET_API_BASE || 'https://api.engineerstechbd.com/api';
    fetch(`${endpoint}/affiliate/track`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ref, svc, event, ts: Date.now() }),
      keepalive: true,
    }).catch(()=>{});
  }

  // Auto-redirect after 1.8s
  let redirected = false;
  setTimeout(() => {
    if (redirected) return;
    redirected = true;
    track('auto_redirect');
    window.location.href = waUrl;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msgText').textContent = "Opened WhatsApp. If it didn't open, tap the button above.";
  }, 1800);

  document.getElementById('waBtn').addEventListener('click', () => {
    redirected = true;
    track('manual_click');
    document.getElementById('spinner').style.display = 'none';
  });

  // ── Affiliate link builder ──
  document.getElementById('genBtn').addEventListener('click', () => {
    const code = document.getElementById('bRef').value.trim();
    const service = document.getElementById('bSvc').value;
    const custom  = document.getElementById('bMsg').value.trim();
    if (!code) { document.getElementById('bRef').focus(); return; }

    const params = new URLSearchParams({ ref: code });
    if (service) params.set('svc', service);
    if (custom)  params.set('msg', custom);

    const link = `${location.origin}${location.pathname}?${params}`;
    const out = document.getElementById('linkOut');
    out.textContent = link;
    out.style.display = 'block';

    const hint = document.getElementById('copyHint');
    out.addEventListener('click', () => {
      navigator.clipboard.writeText(link).then(() => {
        hint.style.display = 'block';
        setTimeout(() => hint.style.display = 'none', 2000);
      });
    }, { once: true });
  });
})();
</script>
</body>
</html>
